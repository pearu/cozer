<title>COZER — Live Order</title>
<style>
  /* Chroma-key overlay: EVERYTHING that is not text/flag is the single --key navy, which the
     video fetcher maps to transparent. No gradients, chips, borders, or row shading. */
  :root{ --key:#0a1a2f; --ink:#ffffff; --dim:#cdd9ea; }
  *{box-sizing:border-box; margin:0; padding:0}
  html,body{height:100%; background:var(--key)}
  body{
    color:var(--ink);
    font-family:"Segoe UI",system-ui,-apple-system,Roboto,Helvetica,Arial,sans-serif;
    -webkit-font-smoothing:antialiased;
    display:flex; justify-content:flex-start; align-items:flex-start;   /* top-left */
    padding:22px;
  }

  ol#order{ list-style:none; width:100%; max-width:380px }   /* compact -> more room for the video */
  li{
    display:grid; align-items:center; gap:10px;
    padding:4px 0;
    background:var(--key);                 /* uniform — keyed out */
    font-variant-numeric:tabular-nums;
    will-change:transform;
  }
  ol.pre li{ grid-template-columns:34px 44px 1fr }
  ol.run li{ grid-template-columns:30px 38px 1fr 34px 88px; gap:8px }

  .nat{ height:18px; display:flex; align-items:center }
  .flag{ height:18px; width:auto; display:block; border-radius:2px }
  .code{ display:none; font-size:12px; font-weight:800; letter-spacing:.04em; color:var(--dim) }
  .nat.noflag .flag{ display:none }
  .nat.noflag .code{ display:block }

  .boat{ font-size:18px; font-weight:800; text-align:right; color:var(--dim) }
  .boat::before{ content:"#"; font-size:12px; opacity:.7 }
  .name{ font-size:20px; font-weight:750; letter-spacing:.01em;
         white-space:nowrap; overflow:hidden; text-overflow:ellipsis }
  .name .first{ font-weight:400; color:var(--dim) }
  .laps{ font-size:16px; font-weight:700; text-align:center }
  .catch{ font-size:15px; font-weight:700; text-align:right; white-space:nowrap }   /* live catch-up */
  .catch.overtake{ color:#ffd24a }   /* projected ahead of a boat ranked above -> overtake brewing */
  .startmsg{ grid-column:4 / -1; text-align:right; font-weight:800; font-size:13px;
             letter-spacing:.04em; white-space:nowrap }   /* pre-race WAITING TO START / START */
  /* Podium — the top-3 rows "stand up": TEXT-ONLY emphasis. A background/box-shadow would show as a
     band on the chroma-keyed video, so we enlarge + medal-tint the text, never the row itself. */
  .p1 .name, .p2 .name, .p3 .name{ font-size:22px; font-weight:850 }
  .p1 .boat, .p2 .boat, .p3 .boat{ font-size:19px }
  .p1 .name{ color:#ffce5c }   /* gold   */
  .p2 .name{ color:#e6edf7 }   /* silver */
  .p3 .name{ color:#e0a46b }   /* bronze */
  @media (prefers-reduced-motion:reduce){ }
</style>

<ol id="order" class="pre" role="table" aria-label="Live running order"></ol>

<script>
  var boats = [], started = false;
  var maxRows = 24;                          // show top-N drivers; cozer sets view.max_rows
  var course = [];                           // per-lap lengths (distance model for the live catch-up)
  var raceAnchor = null;                     // {elapsed, at} race-clock anchor -> live extrapolation
  var catchSpans = {};                       // boat no -> its live catch-up cell (ticked between renders)
  var pollMs = 500, haveData = false;        // poll cadence (feed.view.poll_s overrides) + first-data flag

  var ol = document.getElementById("order");
  var reduce = matchMedia("(prefers-reduced-motion:reduce)").matches;
  var params = new URLSearchParams(location.search);
  var src = params.get("src");                                    // explicit JSON URL (poll)
  // Served from the live server at /<event>/feed/<channel>/ -> data + stream live under that path.
  var feedPath = /^\/[a-z0-9][a-z0-9-]*\/feed\/[a-z0-9][a-z0-9-]*\/?$/.test(location.pathname)
                 ? location.pathname.replace(/\/?$/, "/") : null;
  var flagBase = "/_flags/";                 // flags served by the live server, shared at the root

  function natCell(nat){
    // Flags are shared static SVGs keyed by the 3-letter code; flagBase resolves to the right origin
    // (server vs Pages). A missing/failed flag falls back to the 3-letter code text.
    nat = (nat||"").toUpperCase();
    if(!nat) return '<span class="nat noflag"><span class="code"></span></span>';
    return '<span class="nat"><img class="flag" alt="'+nat+'" src="'+flagBase+nat+'.svg" '
      + 'onerror="this.parentNode.classList.add(\'noflag\')">'
      + '<span class="code">'+nat+'</span></span>';
  }
  function lapsCell(b){                                     // the previous column: just laps completed
    return b.laps != null ? String(b.laps) : "";
  }
  function startMsg(){
    // Pre-race status shown in the first row's right-hand cell (before any lap crossing): the operator
    // hasn't pressed Start (no race clock -> elapsed/raceAnchor is null) => "WAITING TO START"; once
    // Start is pressed (clock running) but nobody has crossed yet => "START".
    if(!boats.length) return null;
    return raceAnchor == null ? "WAITING TO START" : "START";
  }

  // ---- live catch-up-to-the-leader model (continuously updating) ----
  // Each boat has a piece-wise-linear distance D(t): on lap k it moves at that lap's speed
  // v[k] = (lap-k length)/(lap-k time), and past its last crossing it extrapolates at the last lap's
  // speed. The catch-up column = (D_leader(t) - D_boat(t)) / v_boat = the seconds the boat needs to
  // reach the leader's current position if the leader froze at time t. Ticks a few times a second.
  function perfNow(){ return (window.performance && performance.now) ? performance.now() : Date.now(); }
  function raceTime(){
    // Current race-elapsed seconds: from the publish anchor (advances live), else the latest crossing
    // among the boats (static — the feed wasn't timing).
    if(raceAnchor) return raceAnchor.elapsed + (perfNow() - raceAnchor.at) / 1000;
    var mx = 0; boats.forEach(function(b){ var lt = b.laptimes; if(lt && lt.length) mx = Math.max(mx, lt[lt.length-1]); });
    return mx || null;
  }
  function boatModel(b){
    // {tLast, distLast, v}: the last crossing time + cumulative distance there + the last lap's speed.
    // null until the boat has a lap (no speed yet) or the speed is non-positive.
    var lt = b.laptimes;
    if(!lt || !lt.length || !course.length) return null;
    var k = lt.length, dist = 0;
    for(var j = 0; j < k; j++) dist += course[Math.min(j, course.length - 1)];   // dist at lap k
    var lapDur = k >= 2 ? (lt[k-1] - lt[k-2]) : lt[0];                            // last lap duration
    var v = lapDur > 0 ? course[Math.min(k-1, course.length-1)] / lapDur : 0;     // last lap speed
    return v > 0 ? {tLast: lt[k-1], distLast: dist, v: v} : null;
  }
  function distAt(m, t){ return m.distLast + m.v * (t - m.tLast); }
  function catchupCell(b, i, leaderModel, t){
    // First place has no gap to show, so instead show its laps remaining to the end (course length −
    // laps done): "<n> TO GO", "LAST LAP" on the final lap, "FINISH" once done. Followers show the
    // live catch-up-to-leader time ("+…"); the moment a boat finishes its clock stops and it shows the
    // exact finish margin behind the winner (its finish time − the winner's) with 🏁 at the very end;
    // "…" before a boat's first crossing.
    if(i === 0){                                           // the leader / first place
      var N = course.length, togo = N - (b.laps || 0);
      if(!N) return "";
      if(b.finished || togo <= 0) return "FINISH";
      return togo === 1 ? "LAST LAP" : (togo + " TO GO");
    }
    if(b.finished){
      var lt = b.laptimes || [], wt = (boats[0] || {}).laptimes || [];
      if(lt.length && wt.length){
        var margin = lt[lt.length-1] - wt[wt.length-1];    // finish time behind the winner (frozen)
        return "+" + (margin > 0 ? margin : 0).toFixed(1) + " 🏁";
      }
      return "🏁";
    }
    var m = boatModel(b);
    if(!m || !leaderModel || t == null) return "…";        // no speed yet -> unknown
    var secs = (distAt(leaderModel, t) - distAt(m, t)) / m.v;   // time behind the leader at this pace;
    return (secs >= 0 ? "+" : "") + secs.toFixed(1);           // < 0 => projected AHEAD -> overtake brewing
  }
  function tickCatch(){                                     // refresh the live column between renders
    if(!started) return;
    var t = raceTime(), leaderModel = boats.length ? boatModel(boats[0]) : null;
    var maxAbove = 0;                                        // the leader is the 0 reference
    boats.slice(0, maxRows).forEach(function(b, i){
      var s = catchSpans[b.no]; if(!s) return;
      s.textContent = catchupCell(b, i, leaderModel, t);
      var v = null;                                          // this row's numeric time-behind-leader (racing)
      if(i > 0 && !b.finished){
        var m = boatModel(b);
        if(m && leaderModel && t != null) v = (distAt(leaderModel, t) - distAt(m, t)) / m.v;
      }
      // Amber when this boat is projected AHEAD of a boat ranked above it (the leader counts as 0): a
      // negative gap (overtaking the leader) OR a smaller time than a higher-ranked boat (overtaking
      // it) -> an overtake is brewing.
      s.classList.toggle("overtake", v != null && v < maxAbove);
      if(v != null) maxAbove = Math.max(maxAbove, v);
    });
  }

  function render(){
    var msg = started ? null : startMsg();                 // pre-race status for the first row
    ol.className = (started || msg) ? "run" : "pre";        // show the right columns for the status too
    var prevTops = {};
    [].forEach.call(ol.children, function(li){ prevTops[li.dataset.no] = li.getBoundingClientRect().top; });
    ol.innerHTML = "";
    catchSpans = {};
    boats.slice(0, maxRows).forEach(function(b, i){       // top-N only
      var li = document.createElement("li");
      li.dataset.no = b.no;
      if(i < 3) li.className = "p" + (i + 1);              // podium (top 3): text-only emphasis
      var name = '<span class="name">'+(b.name||"")
        + (b.first ? ' <span class="first">'+b.first+'</span>' : '') + '</span>';
      var html = natCell(b.nat) + '<span class="boat">'+b.no+'</span>' + name;
      if(started){
        html += '<span class="laps">'+lapsCell(b)+'</span>'
              + '<span class="catch"></span>';
      } else if(msg && i === 0){                           // pre-race: status in the first row, spans right cols
        html += '<span class="startmsg">'+msg+'</span>';
      }
      li.innerHTML = html;
      if(started) catchSpans[b.no] = li.querySelector(".catch");
      ol.appendChild(li);
    });
    tickCatch();                                           // fill the live catch-up column now
    if(!reduce){                                           // FLIP: slide rows to new slots
      [].forEach.call(ol.children, function(li){
        var o = prevTops[li.dataset.no]; if(o==null) return;
        var dy = o - li.getBoundingClientRect().top;
        if(dy) li.animate([{transform:"translateY("+dy+"px)"},{transform:"translateY(0)"}],
                          {duration:480, easing:"cubic-bezier(.22,.61,.36,1)"});
      });
    }
  }

  // ---- apply a feed snapshot to the overlay ----
  function applyFeed(feed){
    if(feed.live === false){ boats = []; started = false; ol.className = "pre";
      ol.innerHTML = '<li style="grid-template-columns:1fr;color:var(--dim);font-weight:800;'
        + 'letter-spacing:.14em;text-transform:uppercase;font-size:14px">Live stream disabled</li>'
        + '<li style="grid-template-columns:1fr;color:var(--ink);font-weight:900;'
        + 'letter-spacing:.22em;font-size:22px;padding-top:10px">COZER</li>';
      return; }
    started = feed.started != null ? !!feed.started : (feed.order||[]).some(function(r){ return (r.laps||0)>=1; });
    maxRows = (feed.view && feed.view.max_rows > 0) ? feed.view.max_rows : 24;
    course = feed.course || [];                             // per-lap lengths for the distance model
    raceAnchor = (feed.elapsed != null) ? {elapsed: feed.elapsed, at: perfNow()} : null;   // live clock
    boats = (feed.order||[]).map(function(r){
      return {no:String(r.boat), name:r.surname||"", first:"", nat:r.nat||"", laps:r.laps,
              time:r.time, finished:r.finished, laptimes:r.laptimes};
    });
    render();
  }
  setInterval(tickCatch, 250);                 // keep the live catch-up column ticking between snapshots
  function status(msg){
    ol.className = "pre";
    ol.innerHTML = '<li style="grid-template-columns:1fr;color:var(--dim);font-weight:700;'
      + 'font-size:14px;letter-spacing:.02em">'+msg+'</li>';
  }

  // ---- poll a JSON feed URL (the server's data.json, or ?src=) ----
  async function pollServer(url){
    try{
      var r = await fetch(url, {cache:"no-store"});
      if(!r.ok){ if(!haveData) status("Waiting for the feed… ("+r.status+")"); return; }
      var feed = await r.json();
      applyFeed(feed); haveData = true;
      var ps = feed.view && feed.view.poll_s;              // cozer-set poll interval (seconds)
      if(ps > 0) pollMs = ps * 1000;
    }catch(e){ if(!haveData) status("Can't reach the feed — check the network"); }
  }

  function startPolling(url){                              // poll a JSON feed at ~0.5 s (view.poll_s overrides)
    pollMs = 500;
    (function tick(){ pollServer(url).then(function(){ setTimeout(tick, pollMs); }); })();
  }
  if(feedPath){                                            // served from the live server (/<event>/feed/<channel>/)
    status("Connecting…");
    var dataUrl = feedPath + "data.json", streamUrl = feedPath + "stream";
    if(window.EventSource){                                // SSE push (sub-second); poll is the fallback
      var es = new EventSource(streamUrl), fell = false;
      es.onmessage = function(ev){ try{ applyFeed(JSON.parse(ev.data)); haveData = true; }catch(e){} };
      es.onerror = function(){                              // stream unavailable -> fall back to polling
        if(!haveData && !fell){ fell = true; es.close(); startPolling(dataUrl); }
      };
    } else startPolling(dataUrl);
  }
  else if(src){                                            // explicit JSON URL (poll)
    status("Connecting…"); startPolling(src);
  }
  else {                                                   // root / no feed selected: a neutral landing
    ol.className = "pre";
    ol.innerHTML =
      '<li style="grid-template-columns:1fr;color:var(--ink);font-weight:900;letter-spacing:.24em;'
        + 'font-size:32px;padding-bottom:8px">COZER</li>'
      + '<li style="grid-template-columns:1fr;color:var(--dim);font-weight:700;font-size:15px;'
        + 'line-height:1.5">Live running order for powerboat races.<br>'
        + 'Open your event\'s broadcast link to watch.</li>';
  }
</script>
