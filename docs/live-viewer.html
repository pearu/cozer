<title>COZER — Live Order</title>
<style>
  /* Chroma-key overlay: EVERYTHING that is not text/flag is the single --key navy, which the
     video fetcher maps to transparent. No gradients, chips, borders, or row shading. */
  :root{ --key:#0a1a2f; --ink:#ffffff; --dim:#cdd9ea; }
  *{box-sizing:border-box; margin:0; padding:0}
  html,body{height:100%; background:var(--key)}
  body{
    color:var(--ink);
    font-family:"Segoe UI",system-ui,-apple-system,Roboto,Helvetica,Arial,sans-serif;
    -webkit-font-smoothing:antialiased;
    display:flex; justify-content:flex-start; align-items:flex-start;   /* top-left */
    padding:22px;
  }

  ol#order{ list-style:none; width:100%; max-width:380px }   /* compact -> more room for the video */
  li{
    display:grid; align-items:center; gap:10px;
    padding:4px 0;
    background:var(--key);                 /* uniform — keyed out */
    font-variant-numeric:tabular-nums;
    will-change:transform;
  }
  ol.pre li{ grid-template-columns:34px 44px 1fr }
  ol.run li{ grid-template-columns:34px 44px 1fr 42px 70px }

  .nat{ height:18px; display:flex; align-items:center }
  .flag{ height:18px; width:auto; display:block; border-radius:2px }
  .code{ display:none; font-size:12px; font-weight:800; letter-spacing:.04em; color:var(--dim) }
  .nat.noflag .flag{ display:none }
  .nat.noflag .code{ display:block }

  .boat{ font-size:18px; font-weight:800; text-align:right; color:var(--dim) }
  .boat::before{ content:"#"; font-size:12px; opacity:.7 }
  .name{ font-size:20px; font-weight:750; letter-spacing:.01em;
         white-space:nowrap; overflow:hidden; text-overflow:ellipsis }
  .name .first{ font-weight:400; color:var(--dim) }
  .laps{ font-size:17px; font-weight:700; text-align:center }
  .gap{ font-size:16px; font-weight:700; text-align:right; color:var(--dim) }
  /* Podium — the top-3 rows "stand up": TEXT-ONLY emphasis. A background/box-shadow would show as a
     band on the chroma-keyed video, so we enlarge + medal-tint the text, never the row itself. */
  .p1 .name, .p2 .name, .p3 .name{ font-size:22px; font-weight:850 }
  .p1 .boat, .p2 .boat, .p3 .boat{ font-size:19px }
  .p1 .name{ color:#ffce5c }   /* gold   */
  .p2 .name{ color:#e6edf7 }   /* silver */
  .p3 .name{ color:#e0a46b }   /* bronze */
  @media (prefers-reduced-motion:reduce){ }
</style>

<ol id="order" class="pre" role="table" aria-label="Live running order"></ol>

<script>
  var boats = [], started = false;
  var maxRows = 24;                          // show top-N drivers; cozer sets view.max_rows
  var pollMs = 500, haveData = false;        // poll cadence (feed.view.poll_s overrides) + first-data flag

  var ol = document.getElementById("order");
  var reduce = matchMedia("(prefers-reduced-motion:reduce)").matches;
  var params = new URLSearchParams(location.search);
  var src = params.get("src");                                    // explicit JSON URL (poll)
  // Served from the live server at /<event>/feed/<channel>/ -> data + stream live under that path.
  var feedPath = /^\/[a-z0-9][a-z0-9-]*\/feed\/[a-z0-9][a-z0-9-]*\/?$/.test(location.pathname)
                 ? location.pathname.replace(/\/?$/, "/") : null;
  var flagBase = "/_flags/";                 // flags served by the live server, shared at the root

  function natCell(nat){
    // Flags are shared static SVGs keyed by the 3-letter code; flagBase resolves to the right origin
    // (server vs Pages). A missing/failed flag falls back to the 3-letter code text.
    nat = (nat||"").toUpperCase();
    if(!nat) return '<span class="nat noflag"><span class="code"></span></span>';
    return '<span class="nat"><img class="flag" alt="'+nat+'" src="'+flagBase+nat+'.svg" '
      + 'onerror="this.parentNode.classList.add(\'noflag\')">'
      + '<span class="code">'+nat+'</span></span>';
  }
  function gapText(row, prev){
    if(!prev) return "";                                   // leader — no one ahead
    var rl = row.laps||0, pl = prev.laps||0;
    if(rl < pl){ var d = pl-rl; return "+"+d+"L"; }        // a lap (or more) down
    if(row.time!=null && prev.time!=null) return "+"+(row.time-prev.time).toFixed(2);
    return "";
  }

  function render(){
    ol.className = started ? "run" : "pre";
    var prevTops = {};
    [].forEach.call(ol.children, function(li){ prevTops[li.dataset.no] = li.getBoundingClientRect().top; });
    ol.innerHTML = "";
    boats.slice(0, maxRows).forEach(function(b, i){       // top-N only
      var li = document.createElement("li");
      li.dataset.no = b.no;
      if(i < 3) li.className = "p" + (i + 1);              // podium (top 3): text-only emphasis
      var name = '<span class="name">'+(b.name||"")
        + (b.first ? ' <span class="first">'+b.first+'</span>' : '') + '</span>';
      var html = natCell(b.nat) + '<span class="boat">'+b.no+'</span>' + name;
      if(started){
        html += '<span class="laps">'+(b.laps!=null?b.laps:"")+(b.finished?" 🏁":"")+'</span>'
              + '<span class="gap">'+gapText(b, boats[i-1])+'</span>';
      }
      li.innerHTML = html;
      ol.appendChild(li);
    });
    if(!reduce){                                           // FLIP: slide rows to new slots
      [].forEach.call(ol.children, function(li){
        var o = prevTops[li.dataset.no]; if(o==null) return;
        var dy = o - li.getBoundingClientRect().top;
        if(dy) li.animate([{transform:"translateY("+dy+"px)"},{transform:"translateY(0)"}],
                          {duration:480, easing:"cubic-bezier(.22,.61,.36,1)"});
      });
    }
  }

  // ---- apply a feed snapshot to the overlay ----
  function applyFeed(feed){
    if(feed.live === false){ boats = []; started = false; ol.className = "pre";
      ol.innerHTML = '<li style="grid-template-columns:1fr;color:var(--dim);font-weight:800;'
        + 'letter-spacing:.14em;text-transform:uppercase;font-size:14px">Live stream disabled</li>'
        + '<li style="grid-template-columns:1fr;color:var(--ink);font-weight:900;'
        + 'letter-spacing:.22em;font-size:22px;padding-top:10px">COZER</li>';
      return; }
    started = feed.started != null ? !!feed.started : (feed.order||[]).some(function(r){ return (r.laps||0)>=1; });
    maxRows = (feed.view && feed.view.max_rows > 0) ? feed.view.max_rows : 24;
    boats = (feed.order||[]).map(function(r){
      return {no:String(r.boat), name:r.surname||"", first:"", nat:r.nat||"", laps:r.laps,
              time:r.time, finished:r.finished};
    });
    render();
  }
  function status(msg){
    ol.className = "pre";
    ol.innerHTML = '<li style="grid-template-columns:1fr;color:var(--dim);font-weight:700;'
      + 'font-size:14px;letter-spacing:.02em">'+msg+'</li>';
  }

  // ---- poll a JSON feed URL (the server's data.json, or ?src=) ----
  async function pollServer(url){
    try{
      var r = await fetch(url, {cache:"no-store"});
      if(!r.ok){ if(!haveData) status("Waiting for the feed… ("+r.status+")"); return; }
      var feed = await r.json();
      applyFeed(feed); haveData = true;
      var ps = feed.view && feed.view.poll_s;              // cozer-set poll interval (seconds)
      if(ps > 0) pollMs = ps * 1000;
    }catch(e){ if(!haveData) status("Can't reach the feed — check the network"); }
  }

  function startPolling(url){                              // poll a JSON feed at ~0.5 s (view.poll_s overrides)
    pollMs = 500;
    (function tick(){ pollServer(url).then(function(){ setTimeout(tick, pollMs); }); })();
  }
  if(feedPath){                                            // served from the live server (/<event>/feed/<channel>/)
    status("Connecting…");
    var dataUrl = feedPath + "data.json", streamUrl = feedPath + "stream";
    if(window.EventSource){                                // SSE push (sub-second); poll is the fallback
      var es = new EventSource(streamUrl), fell = false;
      es.onmessage = function(ev){ try{ applyFeed(JSON.parse(ev.data)); haveData = true; }catch(e){} };
      es.onerror = function(){                              // stream unavailable -> fall back to polling
        if(!haveData && !fell){ fell = true; es.close(); startPolling(dataUrl); }
      };
    } else startPolling(dataUrl);
  }
  else if(src){                                            // explicit JSON URL (poll)
    status("Connecting…"); startPolling(src);
  }
  else {                                                   // root / no feed selected: a neutral landing
    ol.className = "pre";
    ol.innerHTML =
      '<li style="grid-template-columns:1fr;color:var(--ink);font-weight:900;letter-spacing:.24em;'
        + 'font-size:32px;padding-bottom:8px">COZER</li>'
      + '<li style="grid-template-columns:1fr;color:var(--dim);font-weight:700;font-size:15px;'
        + 'line-height:1.5">Live running order for powerboat races.<br>'
        + 'Open your event\'s broadcast link to watch.</li>';
  }
</script>
