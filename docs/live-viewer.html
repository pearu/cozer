<title>COZER — Live Order</title>
<style>
  /* Chroma-key overlay: EVERYTHING that is not text/flag is the single --key navy, which the
     video fetcher maps to transparent. No gradients, chips, borders, or row shading. */
  :root{ --key:#0a1a2f; --ink:#ffffff; --dim:#cdd9ea; }
  *{box-sizing:border-box; margin:0; padding:0}
  html,body{height:100%; background:var(--key)}
  body{
    color:var(--ink);
    font-family:"Segoe UI",system-ui,-apple-system,Roboto,Helvetica,Arial,sans-serif;
    -webkit-font-smoothing:antialiased;
    display:flex; justify-content:flex-start; align-items:flex-start;   /* top-left */
    padding:22px;
  }

  ol#order{ list-style:none; width:100%; max-width:440px }
  li{
    display:grid; align-items:center; gap:12px;
    padding:5px 0;
    background:var(--key);                 /* uniform — keyed out */
    font-variant-numeric:tabular-nums;
    will-change:transform;
  }
  ol.pre li{ grid-template-columns:40px 50px 1fr }
  ol.run li{ grid-template-columns:40px 50px 1fr 44px 84px }

  .nat{ height:20px; display:flex; align-items:center }
  .flag{ height:20px; width:auto; display:block; border-radius:2px }
  .code{ display:none; font-size:13px; font-weight:800; letter-spacing:.04em; color:var(--dim) }
  .nat.noflag .flag{ display:none }
  .nat.noflag .code{ display:block }

  .boat{ font-size:19px; font-weight:800; text-align:right; color:var(--dim) }
  .boat::before{ content:"#"; font-size:13px; opacity:.7 }
  .name{ font-size:21px; font-weight:750; letter-spacing:.01em;
         white-space:nowrap; overflow:hidden; text-overflow:ellipsis }
  .name .first{ font-weight:400; color:var(--dim) }
  .laps{ font-size:18px; font-weight:700; text-align:center }
  .gap{ font-size:17px; font-weight:700; text-align:right; color:var(--dim) }
  @media (prefers-reduced-motion:reduce){ }
</style>

<ol id="order" class="pre" role="table" aria-label="Live running order"></ol>

<script>
  // ---- mock fallback (no ?gist) ----
  var mock = [
    {no:"91",name:"Musts",first:"Reinis",nat:"LAT"}, {no:"19",name:"Suuk",first:"Rene",nat:"EST"},
    {no:"7",name:"Soodla",first:"Karol",nat:"EST"},  {no:"4",name:"Biete",first:"Hera",nat:"LAT"},
    {no:"93",name:"Lauss",first:"Martins",nat:"LAT"},{no:"44",name:"Musts",first:"Kristers",nat:"LAT"},
  ];
  var boats = mock.slice(), started = false;
  var maxRows = 24;                          // show top-N drivers; cozer sets view.max_rows

  var ol = document.getElementById("order");
  var reduce = matchMedia("(prefers-reduced-motion:reduce)").matches;
  var params = new URLSearchParams(location.search);
  var gistId = params.get("gist"), token = params.get("token");
  var channel = params.get("channel"), src = params.get("src");   // self-hosted server feed

  function natCell(nat){
    // Flags are static repo data (docs/flags/<IOC>.svg), keyed by the 3-letter code — no CDN,
    // works offline. A missing/failed flag falls back to the code text.
    nat = (nat||"").toUpperCase();
    if(!nat) return '<span class="nat noflag"><span class="code"></span></span>';
    return '<span class="nat"><img class="flag" alt="'+nat+'" src="flags/'+nat+'.svg" '
      + 'onerror="this.parentNode.classList.add(\'noflag\')">'
      + '<span class="code">'+nat+'</span></span>';
  }
  function gapText(row, prev){
    if(!prev) return "";                                   // leader — no one ahead
    var rl = row.laps||0, pl = prev.laps||0;
    if(rl < pl){ var d = pl-rl; return "+"+d+"L"; }        // a lap (or more) down
    if(row.time!=null && prev.time!=null) return "+"+(row.time-prev.time).toFixed(2);
    return "";
  }

  function render(){
    ol.className = started ? "run" : "pre";
    var prevTops = {};
    [].forEach.call(ol.children, function(li){ prevTops[li.dataset.no] = li.getBoundingClientRect().top; });
    ol.innerHTML = "";
    boats.slice(0, maxRows).forEach(function(b, i){       // top-N only
      var li = document.createElement("li");
      li.dataset.no = b.no;
      var name = '<span class="name">'+(b.name||"")
        + (b.first ? ' <span class="first">'+b.first+'</span>' : '') + '</span>';
      var html = natCell(b.nat) + '<span class="boat">'+b.no+'</span>' + name;
      if(started){
        html += '<span class="laps">'+(b.laps!=null?b.laps:"")+'</span>'
              + '<span class="gap">'+gapText(b, boats[i-1])+'</span>';
      }
      li.innerHTML = html;
      ol.appendChild(li);
    });
    if(!reduce){                                           // FLIP: slide rows to new slots
      [].forEach.call(ol.children, function(li){
        var o = prevTops[li.dataset.no]; if(o==null) return;
        var dy = o - li.getBoundingClientRect().top;
        if(dy) li.animate([{transform:"translateY("+dy+"px)"},{transform:"translateY(0)"}],
                          {duration:480, easing:"cubic-bezier(.22,.61,.36,1)"});
      });
    }
  }

  // ---- live: poll the gist feed ----
  function applyFeed(feed){
    if(feed.live === false){ boats = []; started = false; ol.className = "pre";
      ol.innerHTML = '<li style="grid-template-columns:1fr;color:var(--dim);font-weight:800;'
        + 'letter-spacing:.14em;text-transform:uppercase;font-size:14px">Live stream disabled</li>';
      return; }
    started = feed.started != null ? !!feed.started : (feed.order||[]).some(function(r){ return (r.laps||0)>=1; });
    maxRows = (feed.view && feed.view.max_rows > 0) ? feed.view.max_rows : 24;
    boats = (feed.order||[]).map(function(r){
      return {no:String(r.boat), name:r.surname||"", first:"", nat:r.nat||"", laps:r.laps, time:r.time};
    });
    render();
  }
  // Fetch mode (avoids the 60/hr unauthenticated gist-API rate limit):
  //   &token=<pat>  -> authed API (freshest, 5000/hr);
  //   &user=<login> -> the RAW gist file (no token, not rate-limited) — the default for a screen;
  //   neither       -> unauthenticated API, polled slowly (a 403 shows a hint to add &user/&token).
  var user = params.get("user"), cb = 0, haveData = false;
  // Poll interval: token/&user paths use view.poll_s (default 3 s). With neither, we do ONE api call,
  // learn the gist owner's login from it, then self-switch to the raw path at poll_s — so a plain
  // ?gist=<id> URL polls fast without hitting the 60/hr anon-API limit. 8 s only while still learning.
  var pollMs = (token || user) ? 3000 : 8000;
  function status(msg){
    ol.className = "pre";
    ol.innerHTML = '<li style="grid-template-columns:1fr;color:var(--dim);font-weight:700;'
      + 'font-size:14px;letter-spacing:.02em">'+msg+'</li>';
  }
  async function poll(){
    var raw = !token && user;
    var url = raw ? ("https://gist.githubusercontent.com/"+encodeURIComponent(user)+"/"
                     +encodeURIComponent(gistId)+"/raw/order.json?_="+(++cb))
                  : ("https://api.github.com/gists/"+encodeURIComponent(gistId));
    try{
      var h = {}; if(!raw){ h["Accept"]="application/vnd.github+json"; if(token) h["Authorization"]="Bearer "+token; }
      var r = await fetch(url, {headers:h, cache:"no-store"});
      if(!r.ok){
        if(!haveData) status(r.status===403
          ? "GitHub rate limit — retrying; add &user=<github-login> to poll the raw feed"
          : "Waiting for the feed… ("+r.status+")");
        return;
      }
      var feed;
      if(raw){ feed = await r.json(); }
      else { var g = await r.json(), f = g.files && g.files["order.json"];
             if(!(f && f.content)){ if(!haveData) status("Gist has no order.json"); return; }
             feed = JSON.parse(f.content);
             if(!token && !user && g.owner && g.owner.login) user = g.owner.login; }  // learn owner -> raw next poll
      applyFeed(feed); haveData = true;
      var ps = feed.view && feed.view.poll_s;             // cozer-set poll interval (seconds)
      if(token || user) pollMs = (ps > 0) ? ps * 1000 : 3000;   // fast once token/&user/learned-owner
    }catch(e){ if(!haveData) status("Can't reach the feed — check the network"); }
  }

  // ---- live: poll the self-hosted server feed (same origin: /live/<channel>.json) ----
  async function pollServer(){
    var url = src || ("/live/" + encodeURIComponent(channel) + ".json");
    try{
      var r = await fetch(url, {cache:"no-store"});
      if(!r.ok){ if(!haveData) status("Waiting for the feed… ("+r.status+")"); return; }
      var feed = await r.json();
      applyFeed(feed); haveData = true;
      var ps = feed.view && feed.view.poll_s;              // cozer-set poll interval (seconds)
      if(ps > 0) pollMs = ps * 1000;
    }catch(e){ if(!haveData) status("Can't reach the feed — check the network"); }
  }

  if(channel || src){                                      // self-hosted server (e.g. live.cozer.ee)
    status("Connecting…"); pollMs = 3000;
    (function tick(){ pollServer().then(function(){ setTimeout(tick, pollMs); }); })();
  }
  else if(gistId){                                         // gist fallback
    status("Connecting…");
    (function tick(){ poll().then(function(){ setTimeout(tick, pollMs); }); })();
  }
  else {                                                   // design preview with mock data
    render();
    if(!reduce) setInterval(function(){                    // shuffle to show the live reorder
      var i = 1 + Math.floor(Math.random()*(boats.length-1));
      var t = boats[i-1]; boats[i-1] = boats[i]; boats[i] = t; render();
    }, 3000);
    setTimeout(function(){                                 // then "start": reveal laps + gap
      started = true;
      boats.forEach(function(b,i){ b.laps = 1; b.time = 30 + i*1.4; });
      render();
    }, 4000);
  }
</script>
