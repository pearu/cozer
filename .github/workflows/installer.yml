name: Windows installer (on demand)

# The Windows installer is the ENVIRONMENT bootstrap (Python + PySide6 + WeasyPrint + ca-certificates
# + the launcher/shortcut files). It does NOT bundle cozer -- post_install runs install_cozer.py,
# which fetches the LATEST cozer wheel from GitHub (offline: an adjacent cozer-*.whl, else a clear
# message). So it is rebuilt ONLY when its environment changes: manual dispatch, or an `installer-*`
# tag. Publishes to a FIXED `windows-installer` release the install guides + update fallback link to.
on:
  workflow_dispatch:
  push:
    tags: ['installer-*']

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write          # create/refresh the `windows-installer` release + upload the .exe
    defaults:
      run:
        shell: bash -el {0}
    steps:
      - uses: actions/checkout@v7

      - name: Build environment (constructor + NSIS)
        uses: mamba-org/setup-micromamba@v3
        with:
          environment-name: build
          create-args: >-
            python=3.13 constructor conda-standalone nsis
          cache-environment: true

      - name: Build the installer (.exe)   # env-only: no cozer wheel is bundled
        run: constructor installer --output-dir dist-installer

      - name: Locate the installer
        id: find
        run: echo "exe=$(ls dist-installer/COZER-*.exe)" >> "$GITHUB_OUTPUT"

      # Silent install with NO /D -> uses default_prefix, i.e. the VERSIONED dir cozer-<installer-ver>.
      # The default may land under the user profile or all-users, so search both (+ C:\).
      - name: Silent install to the DEFAULT (versioned) directory
        id: inst
        shell: pwsh
        run: |
          Start-Process -Wait -FilePath ".\${{ steps.find.outputs.exe }}" -ArgumentList '/S'
          $roots = @($env:USERPROFILE, $env:ALLUSERSPROFILE, 'C:\')
          $dir = $null
          foreach ($r in $roots) {
            $c = Join-Path $r 'cozer-2026.07'
            if (Test-Path (Join-Path $c 'python.exe')) { $dir = $c; break }
          }
          if (-not $dir) {
            Write-Host "versioned dir cozer-2026.07 not found under: $($roots -join ', ')"
            foreach ($r in $roots) {
              Get-ChildItem $r -Directory -ErrorAction SilentlyContinue |
                Where-Object { $_.Name -like 'cozer*' } | ForEach-Object { Write-Host "  present: $($_.FullName)" }
            }
            throw "versioned default_prefix install dir not found"
          }
          Write-Host "installed to versioned dir: $dir"
          Add-Content -Path $env:GITHUB_OUTPUT -Value "prefix=$dir"

      - name: Env-only bootstrap installed the LATEST cozer (online)
        shell: pwsh
        run: |
          & "${{ steps.inst.outputs.prefix }}\python.exe" -c "import cozer; print('cozer', cozer.__version__)"
          if ($LASTEXITCODE -ne 0) { throw 'post_install did not install cozer (online bootstrap failed)' }

      - name: Smoke test (offscreen — no display in CI)
        shell: pwsh
        env:
          QT_QPA_PLATFORM: offscreen
        run: |
          # Mirrors cozer-launch.pyw: prepend <prefix>\Library\bin to PATH + a bound add_dll_directory,
          # then verify cozer imports, Qt inits, and WeasyPrint renders a PDF.
          $py = "${{ steps.inst.outputs.prefix }}\python.exe"
          & $py -c "import os,sys; d=os.path.join(sys.prefix,'Library','bin'); os.environ['PATH']=d+os.pathsep+os.environ.get('PATH',''); _h=os.add_dll_directory(d); import cozer, weasyprint; from PySide6 import QtWidgets; QtWidgets.QApplication([]); weasyprint.HTML(string='<p>ok</p>').write_pdf('smoke.pdf'); print('smoke OK')"

      # Offline path: point the release API at an unreachable host so install_cozer.py takes its
      # offline branch, and give it a cozer-*.whl "placed nearby" (downloaded here to stand in for one
      # the user dropped next to the installer). Verifies the graceful offline fallback installs it.
      - name: Offline fallback (unreachable API -> adjacent cozer wheel)
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $py = "${{ steps.inst.outputs.prefix }}\python.exe"
          New-Item -ItemType Directory -Force -Path offline-wheel | Out-Null
          gh release download --repo ${{ github.repository }} --pattern 'cozer-*.whl' --dir offline-wheel
          $env:COZER_RELEASE_API = 'http://127.0.0.1:9/unreachable'
          $env:COZER_OFFLINE_WHEEL_DIR = (Resolve-Path offline-wheel).Path
          & $py "${{ steps.inst.outputs.prefix }}\install_cozer.py"
          if ($LASTEXITCODE -ne 0) { throw 'offline fallback did not install from the adjacent wheel' }
          Write-Host 'offline fallback OK'

      - name: Publish the installer artifact
        uses: actions/upload-artifact@v7
        with:
          name: cozer-windows-installer
          path: ${{ steps.find.outputs.exe }}
          if-no-files-found: error

      # Publish to the FIXED `windows-installer` release (stable URL
      # releases/download/windows-installer/COZER-Setup-Windows.exe). --latest=false + --prerelease so
      # it never becomes releases/latest (which update.py reads for the newest WHEEL).
      - name: Publish / refresh the Windows-installer release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          cp "${{ steps.find.outputs.exe }}" COZER-Setup-Windows.exe
          gh release create windows-installer --title "COZER Windows installer" \
            --notes "The current COZER Windows installer (environment bootstrap). cozer updates itself in-app." \
            --latest=false --prerelease COZER-Setup-Windows.exe \
          || gh release upload windows-installer --clobber COZER-Setup-Windows.exe
