name: Windows installer

# Manual (and on version tags) — building a full installer is heavy, so it does
# NOT run on every push. Produces a downloadable .exe artifact and smoke-tests it.
on:
  workflow_dispatch:
  push:
    tags: ['v*']

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write          # create the GitHub Release + upload assets (on a v* tag)
    defaults:
      run:
        shell: bash -el {0}
    steps:
      - uses: actions/checkout@v7

      - name: Build environment (constructor + wheel tooling)
        uses: mamba-org/setup-micromamba@v3
        with:
          environment-name: build
          # constructor needs conda-standalone (or micromamba) to lay down the
          # bundled base; nsis provides the Windows installer backend.
          create-args: >-
            python=3.13 constructor conda-standalone nsis python-build
          cache-environment: true

      - name: Build the cozer wheel
        run: python -m build --wheel --outdir installer/dist

      - name: Build the installer (.exe)
        run: constructor installer --output-dir dist-installer

      - name: Locate the installer
        id: find
        run: echo "exe=$(ls dist-installer/COZER-*.exe)" >> "$GITHUB_OUTPUT"

      - name: Silent install to C:\cozer
        shell: pwsh
        run: |
          Start-Process -Wait -FilePath ".\${{ steps.find.outputs.exe }}" -ArgumentList '/S','/D=C:\cozer'
          if (!(Test-Path 'C:\cozer\python.exe')) { throw 'install failed: no python.exe' }

      - name: Smoke test (offscreen — no display in CI)
        shell: pwsh
        env:
          QT_QPA_PLATFORM: offscreen
        run: |
          # Mirrors cozer-launch.pyw: prepend <prefix>\Library\bin to PATH (cffi's
          # find_library, which resolves WeasyPrint's bare-name dlopens, searches
          # PATH) + a bound add_dll_directory for Qt. Verifies the bundled env
          # end-to-end: cozer imports, Qt inits, WeasyPrint renders a PDF.
          C:\cozer\python.exe -c "import os,sys; d=os.path.join(sys.prefix,'Library','bin'); os.environ['PATH']=d+os.pathsep+os.environ.get('PATH',''); _h=os.add_dll_directory(d); import cozer, weasyprint; from PySide6 import QtWidgets; QtWidgets.QApplication([]); weasyprint.HTML(string='<p>ok</p>').write_pdf('smoke.pdf'); print('smoke OK')"

      - name: Publish the installer artifact
        uses: actions/upload-artifact@v7   # v4 ran on the deprecated Node 20
        with:
          name: cozer-windows-installer
          path: ${{ steps.find.outputs.exe }}
          if-no-files-found: error

      # On a v* tag, publish a GitHub Release carrying BOTH the installer .exe and the wheel as
      # public assets -- the Release is the single source the in-app update check reads. NOT marked
      # --prerelease: `releases/latest` (what update.py queries) excludes prereleases, and an rc
      # still needs to be visible to the updater (the version string already signals "rc").
      - name: Publish GitHub Release (on tag)
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "cozer ${{ github.ref_name }}" \
            --generate-notes \
            "${{ steps.find.outputs.exe }}" \
            installer/dist/cozer-*.whl
