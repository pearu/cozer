name: CI

# NOTE: this workflow cannot be executed from the dev server; it is verified on
# the first push to GitHub. Runs the suite on Linux AND Windows from the single
# environment.yml (Qt in offscreen mode, no display required).

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write          # push the coverage badge/data branch (on main)
      pull-requests: write      # post/update the coverage comment (on PRs)
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    defaults:
      run:
        shell: bash -el {0}
    steps:
      - uses: actions/checkout@v7

      - name: Create env from environment.yml
        uses: mamba-org/setup-micromamba@v3
        with:
          environment-file: environment.yml
          cache-environment: true

      - name: Toolchain sanity
        run: |
          python --version
          python -c "from PySide6 import QtCore; print('Qt', QtCore.qVersion())"
          python -c "import weasyprint, fitz; print('report toolchain import OK')"

      - name: Run tests
        env:
          QT_QPA_PLATFORM: offscreen
        run: pytest -ra -n auto  # parallel (pytest-xdist); writes .coverage (pytest-cov via pyproject addopts)

      # Coverage badge (README) + PR comment with diff coverage. Runs once, on the
      # Linux matrix leg only (Docker action; reuses that leg's .coverage). On main
      # it publishes badge.svg to the python-coverage-comment-action-data branch;
      # on a PR it posts/updates a comment. Same-repo only -- fork PRs get no token
      # write access (would need the separate workflow_run setup).
      - name: Coverage comment & badge
        if: matrix.os == 'ubuntu-latest'
        uses: py-cov-action/python-coverage-comment-action@v3
        with:
          GITHUB_TOKEN: ${{ github.token }}
