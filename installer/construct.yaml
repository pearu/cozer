# constructor config — builds a single native installer that bundles a conda
# base + cozer's runtime dependencies. Build ON the target OS (a Windows box or
# CI produces the .exe):
#
#     conda install -c conda-forge constructor   # + NSIS is pulled in on Windows
#     cd installer && constructor .              # -> COZER-<version>-Windows-x86_64.exe
#
# DRAFT: authored on Linux; the Windows-specific bits (NSIS build, post_install
# shortcut) must be validated on a Windows box / CI — see README.md.
#
# `constructor` installs conda PACKAGES from `specs` below. Those mirror the
# RUNTIME subset of ../environment.yml (pytest/pytest-cov/hypothesis/pymupdf are
# test-only and omitted to keep the installer lean). Keep them in sync with
# ../environment.yml; cozer itself is added by post_install.bat (from a wheel
# built beside this file).

name: COZER
# This is the INSTALLER version (date-based, the environment bootstrap) -- set by
# `tools/bump_version.py --installer YYYY.MM`, which also stamps `default_prefix` below. It is
# INDEPENDENT of the cozer (wheel) version, which the installer does NOT bundle: post_install fetches
# the latest cozer from GitHub (install_cozer.py). Bump it only when the ENVIRONMENT changes.
version: 2026.07
company: COZER

channels:
  - conda-forge

specs:
  - python=3.13
  - pyside6                  # Qt GUI
  - weasyprint               # HTML/CSS -> PDF reports (+ cairo/pango/gdk-pixbuf/fontconfig)
  - pip                      # used by post_install to install cozer itself
  - ca-certificates          # CA root bundle for HTTPS (GitHub sign-in) -- see cozer-launch.pyw

installer_type: exe          # Windows NSIS installer (built on a Windows runner)

# a GUI app, not a shell base: don't offer to modify PATH / init the shell
initialize_by_default: false
register_python_default: false
keep_pkgs: false

# Install into a per-INSTALLER-VERSION directory so a newer installer never collides with an existing
# install (constructor refuses a non-empty target -- "File or directory already exists"); versions
# coexist and post_install repoints the shortcut to the newest. `--installer` keeps the
# `cozer-<version>` dir here in sync with `version:` above.
default_prefix: '%USERPROFILE%\cozer-2026.07'
default_prefix_domain_user: '%USERPROFILE%\cozer-2026.07'
default_prefix_all_users: '%ALLUSERSPROFILE%\cozer-2026.07'

# runs after the base env is laid down; %PREFIX% = install location
post_install: post_install.bat

# The installer ships the ENVIRONMENT only -- NOT cozer. post_install runs install_cozer.py, which
# fetches + pip-installs the LATEST cozer wheel from GitHub (offline: an adjacent cozer-*.whl, else a
# clear message). So a cozer *code* release needs NO new installer.
extra_files:
  - install_cozer.py            # post_install: fetch + install the latest cozer (offline fallback)
  - cozer-launch.pyw            # GUI launcher: adds Library\bin to the DLL path
  - make_shortcut.ps1           # creates the Desktop + Start-menu shortcuts (post_install)
  - make_shortcut.bat           # double-clickable re-run if the icons are ever missing
  - cozer-debug.bat             # double-clickable launcher that shows/logs any startup error
